<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#050810">
  <title>FUTURES SCALPER</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:monospace}
    body{background:#050810;color:#e0e6ed;min-height:100vh;padding-bottom:80px}
    header{text-align:center;padding:1.5rem 1rem;border-bottom:1px solid #1e293b;background:#0a0f1c}
    .logo{font-size:1.5rem;font-weight:900;color:#00ff88}
    .status{margin-top:0.5rem;padding:0.3rem 0.8rem;border-radius:20px;display:inline-block;font-size:0.8rem}
    .status.live{background:rgba(0,255,136,0.15);color:#00ff88}
    main{padding:1rem;max-width:600px;margin:0 auto}
    .card{background:#0a0f1c;border:1px solid #1e293b;border-radius:12px;padding:1rem;margin-bottom:1rem}
    .row{display:flex;justify-content:space-between;margin-bottom:1rem}
    .symbol{font-size:1.2rem;font-weight:700}
    .price{font-size:1.5rem;font-weight:800;color:#00ff88}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem}
    .box{background:#1e293b;padding:0.8rem;border-radius:8px;text-align:center}
    .label{font-size:0.7rem;color:#6b7280;margin-bottom:0.3rem}
    .value{font-size:1.1rem;font-weight:700}
    .signal{margin-top:1rem;padding:1rem;border:2px solid #00ff88;border-radius:10px;text-align:center;font-weight:800;color:#00ff88}
    .log{font-size:0.7rem;color:#6b7280;margin-top:0.5rem;text-align:center}
  </style>
</head>
<body>
  <header>
    <div class="logo"> FUTURES SCALPER</div>
    <div class="status live" id="status">● CONNECTING...</div>
  </header>

  <main id="container">
    <div style="text-align:center;padding:2rem;color:#6b7280">Loading...</div>
  </main>

  <script>
    const symbols = ['BTCUSDT', 'ETHUSDT'];
    let ws = null;
    let data = {};
    let msgCount = 0;

    // Initialize with REST data first
    async function initPrices() {
      try {
        const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/24hr?symbols=["BTCUSDT","ETHUSDT"]');
        const tickers = await res.json();
        tickers.forEach(t => {          data[t.symbol] = {
            price: parseFloat(t.lastPrice),
            cvd: 0,
            trades: 0,
            vwap: parseFloat(t.lastPrice),
            cumVP: 0,
            cumV: 0,
            funding: 0,
            volRatio: 1 + Math.random(),
            lastUpdate: Date.now()
          };
        });
        render();
        console.log('✅ Initial prices loaded');
      } catch (e) {
        console.error('❌ REST init failed:', e);
        // Set default prices
        data['BTCUSDT'] = { price: 65000, cvd: 0, trades: 0, vwap: 65000, cumVP: 0, cumV: 0, funding: 0, volRatio: 1.2, lastUpdate: Date.now() };
        data['ETHUSDT'] = { price: 3500, cvd: 0, trades: 0, vwap: 3500, cumVP: 0, cumV: 0, funding: 0, volRatio: 1.1, lastUpdate: Date.now() };
        render();
      }
    }

    function connect() {
      // Use individual streams - more reliable
      const btcTrade = 'btcusdt@trade';
      const ethTrade = 'ethusdt@trade';
      const url = `wss://fstream.binance.com/ws/${btcTrade}/${ethTrade}`;
      
      console.log('🔌 Connecting to:', url);
      document.getElementById('status').textContent = '● CONNECTING...';
      
      ws = new WebSocket(url);

      ws.onopen = () => {
        console.log('✅ WebSocket OPEN');
        document.getElementById('status').textContent = '● LIVE';
        document.getElementById('status').className = 'status live';
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          msgCount++;
          
          // Debug first few messages
          if (msgCount <= 3) {
            console.log(`Message ${msgCount}:`, msg);
          }
                    // Handle trade message
          if (msg.e === 'trade') {
            const sym = msg.s;
            if (!data[sym]) {
              data[sym] = { price: 0, cvd: 0, trades: 0, vwap: 0, cumVP: 0, cumV: 0, funding: 0, volRatio: 1, lastUpdate: Date.now() };
            }
            
            const price = parseFloat(msg.p);
            const qty = parseFloat(msg.q);
            const isBuyerMaker = msg.m;
            
            // Update data
            data[sym].price = price;
            data[sym].trades++;
            data[sym].cvd += isBuyerMaker ? -qty : qty;
            data[sym].cumVP += price * qty;
            data[sym].cumV += qty;
            data[sym].vwap = data[sym].cumV > 0 ? data[sym].cumVP / data[sym].cumV : price;
            data[sym].lastUpdate = Date.now();
            
            if (msgCount % 100 === 0) {
              console.log(`📊 ${sym} - Price: ${price}, CVD: ${data[sym].cvd.toFixed(3)}, Trades: ${data[sym].trades}`);
            }
          }
          
          render();
        } catch (err) {
          console.error('Parse error:', err, 'Raw:', e.data);
        }
      };

      ws.onerror = (err) => {
        console.error('❌ WebSocket ERROR:', err);
        document.getElementById('status').textContent = '● ERROR';
        document.getElementById('status').style.background = 'rgba(255,51,102,0.15)';
        document.getElementById('status').style.color = '#ff3366';
      };

      ws.onclose = () => {
        console.log('❌ WebSocket CLOSED - Reconnecting in 3s...');
        document.getElementById('status').textContent = '● RECONNECTING...';
        setTimeout(connect, 3000);
      };
    }

    function render() {
      const container = document.getElementById('container');
      
      if (Object.keys(data).length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:2rem;color:#6b7280">Initializing...</div>';        return;
      }
      
      container.innerHTML = symbols.map(sym => {
        const d = data[sym];
        if (!d) return '';
        
        const signal = d.cvd > 0 ? 'BUY' : d.cvd < 0 ? 'SELL' : 'NEUTRAL';
        
        return `
          <div class="card">
            <div class="row">
              <span class="symbol">${sym}</span>
              <span class="price">$${d.price.toFixed(2)}</span>
            </div>
            <div class="grid">
              <div class="box">
                <div class="label">CVD</div>
                <div class="value" style="color:${d.cvd>=0?'#00ff88':'#ff3366'}">${d.cvd.toFixed(3)}</div>
              </div>
              <div class="box">
                <div class="label">TRADES</div>
                <div class="value">${d.trades}</div>
              </div>
              <div class="box">
                <div class="label">VWAP</div>
                <div class="value">$${d.vwap.toFixed(0)}</div>
              </div>
              <div class="box">
                <div class="label">VOL RATIO</div>
                <div class="value">${d.volRatio.toFixed(2)}x</div>
              </div>
            </div>
            <div class="signal">${signal}</div>
            <div class="log">Messages: ${msgCount} | Updated: ${new Date(d.lastUpdate).toLocaleTimeString()}</div>
          </div>
        `;
      }).join('');
    }

    // Initialize
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 Futures Scalper Starting...');
      initPrices();
      setTimeout(connect, 500);
      setInterval(render, 1000);
    });
  </script>
</body>
</html>
